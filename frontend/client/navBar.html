<!-- navBar.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-lt: #E8C97A;
    --gold-dim: rgba(201,168,76,0.15);
    --dark: #0D0B09; --light: #F5F0E8;
    --muted: rgba(245,240,232,0.45);
    --border: rgba(201,168,76,0.18);
  }

  .client-nav {
    background: #0D0B09;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .client-nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .client-nav-brand .brand-logo {
    width: 34px; height: 34px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .client-nav-brand .brand-logo svg {
    width: 18px; height: 18px;
    fill: var(--gold);
  }

  .client-nav-brand .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .client-nav-brand .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--light);
  }

  .client-nav-brand .brand-tagline {
    font-size: 0.52rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .client-nav-links {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    flex-wrap: nowrap;
    scrollbar-width: none;
  }

  .client-nav-links a {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 1.1rem;
    height: 45px;
    text-decoration: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.6);
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .client-nav-links a svg {
    width: 15px; height: 15px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    flex-shrink: 0;
  }

  .client-nav-links a:hover {
    color: var(--light);
    border-bottom-color: rgba(201,168,76,0.4);
  }

  .client-nav-links a.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .client-nav-divider {
    width: 1px; height: 24px;
    background: rgba(201,168,76,0.2);
    margin: 0 0.5rem;
  }

  .client-nav-links a.logout-btn {
    color: rgba(201,168,76,0.7);
  }

  .client-nav-links a.logout-btn:hover {
    color: var(--gold);
    border-bottom-color: transparent;
  }

  /* ── Bouton spécial "Accueil visiteur" ── */
  .client-nav-links a.visitor-btn {
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px;
    height: 36px;
    padding: 0 1rem;
    margin: 0 0.4rem;
    font-size: 0.65rem;
  }

  .client-nav-links a.visitor-btn:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-lt);
    border-bottom-color: transparent;
  }

  /* user chip */
  .nav-user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 1rem;
    height: 64px;
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    border-right: 1px solid var(--border);
    margin-right: 0.25rem;
  }

  .nav-user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0;
    flex-shrink: 0;
  }
</style>
</head>
<body>
    <nav class="client-nav">
  <a href="dashboard.html" class="client-nav-brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L13.5 10 L22 12 L13.5 14 L12 22 L10.5 14 L2 12 L10.5 10 Z"/>
        <circle cx="12" cy="12" r="2.5"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">Horizon</span>
      <span class="brand-tagline">Espace client</span>
    </div>
  </a>

  <div class="client-nav-links">
    
    <div class="client-nav-divider"></div>

    <!-- ✦ NOUVEAUX LIENS vers l'espace visiteur ✦ -->
    <!-- Accueil : bouton doré distinct pour signaler le changement de contexte -->
    <a href="../visitor/home.html#" class="visitor-btn" id="nav-visitor-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </a>
    
    <div class="client-nav-divider"></div>

    <!-- Liens espace client -->
    <a href="dashboard.html" id="nav-dashboard">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Tableau de bord
    </a>
    <a href="reservations.html" id="nav-reservations">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Réservations
    </a>
    <a href="addAvis.html" id="nav-avis">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Avis
    </a>
    <a href="messages.html" id="nav-messages">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </a>

    

    <!-- User chip : rempli par JS depuis localStorage -->
    <div class="nav-user-chip" id="navUserChip">
      <div class="nav-user-avatar" id="navUserAvatar">?</div>
      <span id="navUserName">—</span>
    </div>
    <a href="#" class="logout-btn" id="logoutBtn">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </a>
  </div>
</nav>

</body>
</html>
