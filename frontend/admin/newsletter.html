<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter — Horizon Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #C9A84C;
            --gold-lt: #E8C97A;
            --gold-dim: rgba(201,168,76,0.12);
            --dark: #0D0B09;
            --ink: #1C1814;
            --ink-2: #4A3F35;
            --ink-3: #8C7B6E;
            --sand: #F7F3ED;
            --sand-2: #EDE6DB;
            --sand-3: #E0D5C5;
            --white: #FDFBF8;
            --border: rgba(28,24,20,0.1);
            --border-gold: rgba(201,168,76,0.25);
            --shadow-sm: 0 1px 3px rgba(28,24,20,0.06), 0 1px 2px rgba(28,24,20,0.04);
            --shadow-md: 0 4px 16px rgba(28,24,20,0.08), 0 2px 6px rgba(28,24,20,0.04);
            --shadow-lg: 0 12px 40px rgba(28,24,20,0.1), 0 4px 12px rgba(28,24,20,0.06);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sand);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── NAVBAR (dark, identique espace visiteur) ── */
        #navbar { position: sticky; top: 0; z-index: 200; }

        /* ── LAYOUT ── */
        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .page-header-left { display: flex; flex-direction: column; gap: 4px; }
        .page-eyebrow {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-eyebrow::before {
            content: '';
            display: inline-block;
            width: 20px; height: 1px;
            background: var(--gold);
        }
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--ink);
            line-height: 1.1;
        }
        .page-title em { color: var(--gold); font-style: italic; }

        /* ── STATS ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--gold-lt));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }
        .stat-card:hover::after { transform: scaleX(1); }
        .stat-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--ink);
            line-height: 1;
            margin-bottom: 4px;
        }
        .stat-num span { color: var(--gold); }
        .stat-lbl {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-3);
        }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .search-wrap {
            position: relative;
            flex: 1;
            
        }
        .search-wrap svg {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            width: 15px; height: 15px;
            stroke: var(--ink-3); fill: none; stroke-width: 1.8;
            pointer-events: none;
        }
        .search-box {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--ink);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .search-box::placeholder { color: var(--ink-3); }
        .search-box:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }
        .count-label {
            font-size: 0.78rem;
            color: white;
            font-weight: 400;
            white-space: nowrap;
            background-color: var(--gold);
            padding: 3px 6px;
            border-radius: 6px;
        }

        /* ── TABLE CARD ── */
        .table-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr {
            background: var(--sand-2);
            border-bottom: 1px solid var(--border);
        }
        th {
            padding: 0.85rem 1.25rem;
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-2);
        }
        td {
            padding: 0.9rem 1.25rem;
            font-size: 0.85rem;
            color: var(--ink);
            border-bottom: 1px solid var(--border);
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover td { background: var(--sand); }

        .td-id { color: var(--ink-3); font-size: 0.78rem; font-variant-numeric: tabular-nums; }
        .td-nom { font-weight: 500; }
        .td-email { color: var(--ink-2); font-size: 0.82rem; }
        .td-date { font-size: 0.78rem; color: var(--ink-3); white-space: nowrap; }

        /* Avatar chip */
        .avatar-chip {
            display: flex; align-items: center; gap: 10px;
        }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--gold-dim);
            border: 1px solid var(--border-gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700; color: var(--gold);
            flex-shrink: 0; font-family: 'DM Sans', sans-serif;
            text-transform: uppercase;
        }

        /* Delete button */
        .btn-del {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 0.3rem 0.75rem;
            background: transparent;
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 6px;
            color: #c0392b;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-del svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
        .btn-del:hover { background: #c0392b; border-color: #c0392b; color: #fff; }

        /* ── EMPTY ── */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            padding: 4rem 2rem; gap: 1rem;
        }
        .empty-state svg {
            width: 48px; height: 48px; stroke: var(--sand-3);
            fill: none; stroke-width: 1.2;
        }
        .empty-state p { font-size: 0.9rem; color: var(--ink-3); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            padding: 0.75rem 1.25rem;
            border-radius: 8px; font-size: 0.83rem; font-weight: 500;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; z-index: 999;
            box-shadow: var(--shadow-lg);
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #fff; color: #1a7a4a; border: 1px solid rgba(26,122,74,0.2); }
        .toast.error   { background: #fff; color: #c0392b; border: 1px solid rgba(192,57,43,0.2); }

        /* ── LOADING ── */
        .loading {
            display: flex; align-items: center; justify-content: center;
            padding: 3rem; gap: 10px; color: var(--ink-3); font-size: 0.85rem;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--sand-3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .page-wrap { padding: 1.5rem 1rem 3rem; }
            .page-title { font-size: 1.7rem; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <div class="page-header-left">
            <div class="page-eyebrow">Administration</div>
            <h1 class="page-title">Newsletter — <em>Abonnés</em></h1>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-num" id="total-count"><span>—</span></div>
            <div class="stat-lbl">Total abonnés</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="month-count"><span>—</span></div>
            <div class="stat-lbl">Ce mois-ci</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-box" id="search-input"
                   placeholder="Rechercher par nom ou email…" oninput="filterTable()">
        </div>
        <span class="count-label" id="count-label"></span>
    </div>

    <!-- Table -->
    <div class="table-card" id="tableWrap">
        <div class="loading"><div class="spinner"></div> Chargement…</div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'Admin') window.location.href = '../index.html';

    let allData = [];

    // ── Navbar ──
    fetch('navBarAdmin.html').then(r => r.text()).then(html => {
        document.getElementById('navbar').innerHTML = html;
        document.getElementById('nav-newsletter')?.classList.add('active');
        document.getElementById('logoutBtn')?.addEventListener('click', e => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = '../visitor/home.html';
        });
    });

    // ── Toast ──
    function showToast(msg, type = 'success') {
        const icon = type === 'success' ? '✓' : '✕';
        const t = document.getElementById('toast');
        t.innerHTML = `<span>${icon}</span> ${msg}`;
        t.className = `toast show ${type}`;
        setTimeout(() => t.className = 'toast', 3200);
    }

    // ── Format date ──
    function formatDate(d) {
        if (!d) return '—';
        return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // ── Initials ──
    function getInitials(nom) {
        if (!nom) return '?';
        return nom.trim().split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    // ── Render ──
    function renderTable(data) {
        const wrap = document.getElementById('tableWrap');
        document.getElementById('count-label').textContent = `${data.length} abonné${data.length > 1 ? 's' : ''} affiché${data.length > 1 ? 's' : ''}`;

        if (!data.length) {
            wrap.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <p>Aucun abonné trouvé</p>
                </div>`;
            return;
        }

        wrap.innerHTML = `
            <table>
                <thead><tr>
                    <th>#</th>
                    <th>Abonné</th>
                    <th>Email</th>
                    <th>Date d'inscription</th>
                    <th>Action</th>
                </tr></thead>
                <tbody>
                    ${data.map(r => `
                        <tr>
                            <td class="td-id">${r.id}</td>
                            <td>
                                <div class="avatar-chip">
                                    <div class="avatar">${getInitials(r.nom)}</div>
                                    <span class="td-nom">${r.nom || '—'}</span>
                                </div>
                            </td>
                            <td class="td-email">${r.email}</td>
                            <td class="td-date">${formatDate(r.date_inscription)}</td>
                            <td>
                                <button class="btn-del" onclick="deleteAbonne(${r.id})">
                                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                                    Supprimer
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    // ── Filter ──
    function filterTable() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderTable(allData.filter(r =>
            (r.nom || '').toLowerCase().includes(q) || r.email.toLowerCase().includes(q)
        ));
    }

    // ── Load ──
    function loadNewsletter() {
        fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/newsletter&admin_id=${user.id}`)
            .then(r => r.json())
            .then(data => {
                allData = Array.isArray(data) ? data : [];
                document.getElementById('total-count').innerHTML = `<span>${allData.length}</span>`;
                const now = new Date();
                const thisMonth = allData.filter(r => {
                    const d = new Date(r.date_inscription);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }).length;
                document.getElementById('month-count').innerHTML = `<span>${thisMonth}</span>`;
                renderTable(allData);
            })
            .catch(() => {
                document.getElementById('tableWrap').innerHTML =
                    '<div class="empty-state"><p>Erreur de chargement. Vérifiez la connexion.</p></div>';
            });
    }

    // ── Delete ──
    window.deleteAbonne = function(id) {
        if (!confirm('Supprimer définitivement cet abonné ?')) return;
        fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/newsletter&admin_id=${user.id}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        })
        .then(r => r.json())
        .then(res => {
            if (res.success) { showToast('Abonné supprimé'); loadNewsletter(); }
            else showToast(res.error || 'Erreur', 'error');
        });
    };

    loadNewsletter();
</script>
</body>
</html>
