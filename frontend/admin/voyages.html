<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyages · Admin · Horizon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/adminVoyages.css">
</head>
<body>

<div id="navbar"></div>

<div class="page-wrap">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Gestion des <span>voyages</span></h1>
            <div class="page-subtitle">Administration · Horizon Voyages</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('liste')">
            Liste des voyages
        </button>
        <button class="tab-btn" onclick="switchTab('ajouter')" id="tab-ajouter">
            Ajouter un voyage
        </button>
    </div>

    <!-- ── TAB : LISTE ── -->
    <div class="tab-panel active" id="panel-liste">

        <div class="table-wrap">
            <div class="table-header">
                <div class="table-header-title">
                    Voyages
                    <span class="count-badge" id="voyageCount">—</span>
                </div>
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Rechercher un voyage…" oninput="filterVoyages()">
                </div>
            </div>

            <div id="voyagesTable">
                <div class="state-loading">Chargement</div>
            </div>
        </div>

    </div>

    <!-- ── TAB : AJOUTER / MODIFIER ── -->
    <div class="tab-panel" id="panel-ajouter">
        <div class="form-card">
            <div class="form-card-title">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span id="formCardTitle">Nouveau voyage</span>
            </div>

            <div class="form-grid">
                <div class="form-group half">
                    <label for="titre">Titre du voyage *</label>
                    <input type="text" id="titre" placeholder="Ex: Séjour à Marrakech">
                </div>
                <div class="form-group">
                    <label for="prix">Prix (TND) *</label>
                    <input type="number" id="prix" step="0.01" min="0" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="date_depart">Date de départ *</label>
                    <input type="date" id="date_depart">
                </div>
                <div class="form-group">
                    <label for="date_retour">Date de retour</label>
                    <input type="date" id="date_retour">
                </div>
                <div class="form-group">
                    <label for="places_dispo">Places disponibles</label>
                    <input type="number" id="places_dispo" min="0" placeholder="0">
                </div>
                <!-- <div class="form-group full">
                    <label for="image">URL de l'image</label>
                    <input type="text" id="image" placeholder="https://…">
                </div> -->
                <div class="form-group full">
                    <input type="hidden" id="currentImage">
                    <label>Image par glisser-déposer</label>
                    <div class="dropzone" id="imageDropzone">
                        Glisser une image ici ou <strong>cliquer pour sélectionner</strong>
                    </div>
                    <input type="file" id="imageFile" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;">
                    <div id="imagePreview" class="image-preview" style="display:none;">
                        <img id="imagePreviewThumb" src="" alt="Aperçu de l'image">
                        <div>
                            <span id="imagePreviewName"></span>
                            <small>Fichier prêt à être téléchargé</small>
                        </div>
                    </div>
                </div>
                <div class="form-group full">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Décrivez le voyage…" rows="4"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn-primary" id="submitBtn" onclick="submitVoyage()">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                    <span id="submitBtnLabel">Créer le voyage</span>
                </button>
                <button class="btn-secondary" id="cancelEditBtn" style="display:none;" onclick="cancelEdit()">
                    Annuler la modification
                </button>
            </div>
        </div>
    </div>

</div><!-- /page-wrap -->

<!-- ── MODAL RÉSERVATIONS ── -->
<div class="modal-overlay" id="resModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Réservations du voyage</div>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body" id="modalBody">
            <div class="state-loading">Chargement</div>
        </div>
    </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
    <svg viewBox="0 0 24 24" id="toastIcon"></svg>
    <span id="toastMsg"></span>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user || user.role !== 'Admin') window.location.href = '../visitor/home.html';

const BASE = `http://localhost/agence_voyage/backend/index.php`;
let allVoyages = [];
let editingId = null;

function updateImagePreview(file, previewUrl) {
    const preview = document.getElementById('imagePreview');
    const thumb = document.getElementById('imagePreviewThumb');
    const name = document.getElementById('imagePreviewName');

    if (!file && !previewUrl) {
        preview.style.display = 'none';
        thumb.src = '';
        name.textContent = '';
        return;
    }

    preview.style.display = 'grid';
    thumb.src = previewUrl || URL.createObjectURL(file);
    name.textContent = file ? file.name : 'Image actuelle';
}

function clearImagePreview() {
    document.getElementById('imageFile').value = '';
    document.getElementById('currentImage').value = '';
    updateImagePreview(null, null);
}

function setupImageDropzone() {
    const dropzone = document.getElementById('imageDropzone');
    const fileInput = document.getElementById('imageFile');

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropzone.classList.remove('dragover');
        const file = event.dataTransfer.files[0];
        if (!file) return;
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        fileInput.files = dataTransfer.files;
        updateImagePreview(file);
    });
    fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) return;
        updateImagePreview(file);
    });
}


// ── Load Navbar ──
fetch('navBarAdmin.html')
    .then(r => r.text())
    .then(html => {
        document.getElementById('navbar').innerHTML = html;

        // Active link
        const page = window.location.pathname.split('/').pop();
        const map = {
            'dashboard.html': 'nav-dashboard',
            'reservations.html': 'nav-reservations',
            'voyages.html': 'nav-voyages',
            'avis.html': 'nav-avis',
            'messages.html': 'nav-messages'
        };
        if (map[page]) {
            document.getElementById(map[page])?.classList.add('active');
        }

        // Logout
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = '../visitor/home.html';
        });
    });

// ── Tab Switcher ──
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'liste') || (i === 1 && tab === 'ajouter'));
    });
    document.getElementById('panel-liste').classList.toggle('active', tab === 'liste');
    document.getElementById('panel-ajouter').classList.toggle('active', tab === 'ajouter');
}

// ── Toast ──
function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    const icon = document.getElementById('toastIcon');
    document.getElementById('toastMsg').textContent = msg;
    toast.className = `toast ${type}`;
    icon.innerHTML = type === 'success'
        ? '<polyline points="20 6 9 17 4 12"/>'
        : '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
}

// ── Format date ──
function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── Load Voyages ──
function loadVoyages() {
    document.getElementById('voyagesTable').innerHTML = '<div class="state-loading">Chargement</div>';

    fetch(`${BASE}?uri=admin/voyages&admin_id=${user.id}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                document.getElementById('voyagesTable').innerHTML = `<div class="state-empty"><p>${data.error}</p></div>`;
                return;
            }
            allVoyages = data;
            document.getElementById('voyageCount').textContent = data.length;
            renderTable(data);
        })
        .catch(() => {
            document.getElementById('voyagesTable').innerHTML = '<div class="state-empty"><p>Erreur de connexion au serveur.</p></div>';
        });
}

// ── Render Table ──
function renderTable(data) {
    const container = document.getElementById('voyagesTable');

    if (data.length === 0) {
        container.innerHTML = `
            <div class="state-empty">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <p>Aucun voyage trouvé</p>
            </div>`;
        return;
    }

    const rows = data.map(v => {
        const places = parseInt(v.places_dispo);
        const placesPill = places > 10
            ? `<span class="status-pill pill-green">${places} places</span>`
            : places > 0
            ? `<span class="status-pill pill-gold">${places} places</span>`
            : `<span class="status-pill pill-red">Complet</span>`;

        const thumb = v.image
            ? `<img src="${v.image}" alt="" class="voyage-thumb" onerror="this.style.display='none'">`
            : `<div class="voyage-thumb-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

        const resTotal = parseInt(v.total_reservations) || 0;
        const resConfirmees = parseInt(v.reservations_confirmees) || 0;
        const resAttente = parseInt(v.reservations_attente) || 0;
        const ca = parseFloat(v.chiffre_affaires) || 0;

        return `
            <tr>
                <td>${thumb}</td>
                <td class="titre-cell">
                    <div class="titre-text" title="${v.titre}">${v.titre}</div>
                </td>
                <td><strong style="color:var(--gold)">${parseFloat(v.prix).toLocaleString('fr-FR')} TND</strong></td>
                <td style="white-space:nowrap">${fmtDate(v.date_depart)}</td>
                <td style="white-space:nowrap">${fmtDate(v.date_retour)}</td>
                <td>${placesPill}</td>
                <td>
                    <div class="res-stat">
                        <span class="res-total">${resTotal}</span>
                        <span class="res-detail">${resConfirmees} conf. · ${resAttente} att.</span>
                    </div>
                </td>
                <td style="color:var(--gold);font-weight:500;white-space:nowrap">${ca.toLocaleString('fr-FR')} TND</td>
                <td>
                    <div class="action-group">
                        <button class="btn-icon view" title="Voir les réservations" onclick="openReservations(${v.id}, '${v.titre.replace(/'/g,"\\'")}', '${v.image || ''}')">
                            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button class="btn-icon edit" title="Modifier" onclick="editVoyage(${v.id})">
                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-icon del" title="Supprimer" onclick="deleteVoyage(${v.id}, '${v.titre.replace(/'/g,"\\'")}')">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                        </button>
                    </div>
                </td>
            </tr>`;
    }).join('');

    container.innerHTML = `
        <div style="overflow-x:auto">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Titre</th>
                        <th>Prix</th>
                        <th>Départ</th>
                        <th>Retour</th>
                        <th>Disponibilité</th>
                        <th>Réservations</th>
                        <th>Chiffre d'affaires</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
}

// ── Filter / Search ──
function filterVoyages() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) { renderTable(allVoyages); return; }
    const filtered = allVoyages.filter(v =>
        v.titre.toLowerCase().includes(q) ||
        (v.description || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
}

// ── Edit Voyage ──
function editVoyage(id) {
    const voyage = allVoyages.find(v => v.id == id);
    if (!voyage) return;

    // Basculer vers l'onglet d'ajout avant d'accéder aux éléments du formulaire
    switchTab('ajouter');

    // Attendre un court instant pour que le DOM soit mis à jour
    setTimeout(() => {
        document.getElementById('titre').value        = voyage.titre || '';
        document.getElementById('description').value  = voyage.description || '';
        document.getElementById('prix').value         = voyage.prix || '';
        document.getElementById('date_depart').value  = voyage.date_depart || '';
        document.getElementById('date_retour').value  = voyage.date_retour || '';
        document.getElementById('currentImage').value = voyage.image || '';
        document.getElementById('places_dispo').value = voyage.places_dispo || '';
        updateImagePreview(null, voyage.image || '');

        editingId = id;
        document.getElementById('formCardTitle').textContent    = `Modifier · ${voyage.titre}`;
        document.getElementById('submitBtnLabel').textContent   = 'Mettre à jour';
        document.getElementById('cancelEditBtn').style.display  = 'inline-flex';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Initialiser la dropzone d'image
        setupImageDropzone();
    }, 10);
}

// ── Cancel Edit ──
function cancelEdit() {
    editingId = null;
    document.getElementById('titre').value        = '';
    document.getElementById('description').value  = '';
    document.getElementById('prix').value         = '';
    document.getElementById('date_depart').value  = '';
    document.getElementById('date_retour').value  = '';
    document.getElementById('places_dispo').value = '';
    document.getElementById('currentImage').value = '';
    clearImagePreview();
    document.getElementById('formCardTitle').textContent   = 'Nouveau voyage';
    document.getElementById('submitBtnLabel').textContent  = 'Créer le voyage';
    document.getElementById('cancelEditBtn').style.display = 'none';
    switchTab('liste');
}

// ── Submit (Create or Update) ──
function submitVoyage() {
    const currentImage = document.getElementById('currentImage').value.trim();
    const fileInput = document.getElementById('imageFile');
    const imageFile = fileInput.files[0];

    const voyage = {
        titre:        document.getElementById('titre').value.trim(),
        description:  document.getElementById('description').value.trim(),
        prix:         parseFloat(document.getElementById('prix').value) || 0,
        date_depart:  document.getElementById('date_depart').value,
        date_retour:  document.getElementById('date_retour').value,
        image:        currentImage,
        places_dispo: parseInt(document.getElementById('places_dispo').value) || 0
    };

    if (!voyage.titre || !voyage.prix || !voyage.date_depart) {
        showToast('Titre, prix et date de départ sont obligatoires', 'error');
        return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.style.opacity = '0.7';

    let method = 'POST';
    if (editingId) { voyage.id = editingId; method = 'PUT'; }

    let body;
    const options = { method };

    if (imageFile) {
        const formData = new FormData();
        formData.append('titre', voyage.titre);
        formData.append('description', voyage.description);
        formData.append('prix', voyage.prix);
        formData.append('date_depart', voyage.date_depart);
        formData.append('date_retour', voyage.date_retour);
        formData.append('places_dispo', voyage.places_dispo);
        formData.append('image', currentImage);
        formData.append('image_file', imageFile);
        if (editingId) {
            formData.append('id', editingId);
            formData.append('_method', 'PUT');
            options.method = 'POST';
        }
        body = formData;
    } else {
        if (editingId) {
            options.method = 'PUT';
        }
        options.headers = { 'Content-Type': 'application/json' };
        body = JSON.stringify(voyage);
    }

    options.body = body;

    fetch(`${BASE}?uri=admin/voyages&admin_id=${user.id}`, options)
    .then(r => r.json())
    .then(data => {
        btn.disabled = false;
        btn.style.opacity = '1';
        if (data.success) {
            showToast(data.success);
            cancelEdit();
            loadVoyages();
        } else {
            showToast(data.error || 'Erreur inconnue', 'error');
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.style.opacity = '1';
        showToast('Erreur de connexion au serveur', 'error');
    });
}

setupImageDropzone();

// ── Delete Voyage ──
function deleteVoyage(id, titre) {
    if (!confirm(`Supprimer "${titre}" ?\n\nLes réservations actives empêcheront la suppression.`)) return;

    fetch(`${BASE}?uri=admin/voyages&id=${id}&admin_id=${user.id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showToast(data.success);
                loadVoyages();
            } else {
                showToast(data.error || 'Suppression impossible', 'error');
            }
        })
        .catch(() => showToast('Erreur de connexion', 'error'));
}

// ── Open Reservations Modal ──
function openReservations(voyageId, titre, imgUrl) {
    document.getElementById('modalTitle').textContent = `Réservations · ${titre}`;
    document.getElementById('modalBody').innerHTML = '<div class="state-loading">Chargement</div>';
    document.getElementById('resModal').classList.add('open');

    const voyage = allVoyages.find(v => v.id == voyageId);

    fetch(`${BASE}?uri=admin/voyages/reservations&voyage_id=${voyageId}&admin_id=${user.id}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                document.getElementById('modalBody').innerHTML = `<div class="state-empty"><p>${data.error}</p></div>`;
                return;
            }

            const thumb = imgUrl
                ? `<img src="${imgUrl}" alt="" class="res-voyage-img" onerror="this.outerHTML='<div class=res-voyage-img-placeholder><svg viewBox=\\'0 0 24 24\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/></svg></div>'">`
                : `<div class="res-voyage-img-placeholder"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>`;

            const total = data.length;
            const confirmees = data.filter(r => r.statut === 'confirmee').length;
            const attente    = data.filter(r => r.statut === 'en_attente').length;
            const annulees   = data.filter(r => r.statut === 'annulee').length;
            const ca = data.filter(r => r.statut !== 'annulee').reduce((s, r) => s + parseFloat(r.prix_total || 0), 0);

            const infoBox = `
                <div class="res-voyage-info">
                    ${thumb}
                    <div class="res-voyage-meta">
                        <div class="res-voyage-name">${titre}</div>
                        <div class="res-voyage-stats">
                            <div class="res-stat-item">
                                <span class="res-stat-label">Total</span>
                                <span class="res-stat-value">${total}</span>
                            </div>
                            <div class="res-stat-item">
                                <span class="res-stat-label">Confirmées</span>
                                <span class="res-stat-value" style="color:#5cb85c">${confirmees}</span>
                            </div>
                            <div class="res-stat-item">
                                <span class="res-stat-label">En attente</span>
                                <span class="res-stat-value" style="color:var(--gold)">${attente}</span>
                            </div>
                            <div class="res-stat-item">
                                <span class="res-stat-label">Annulées</span>
                                <span class="res-stat-value" style="color:#e74c3c">${annulees}</span>
                            </div>
                            <div class="res-stat-item">
                                <span class="res-stat-label">C.A. actif</span>
                                <span class="res-stat-value">${ca.toLocaleString('fr-FR')} TND</span>
                            </div>
                        </div>
                    </div>
                </div>`;

            let tableHtml = '';
            if (data.length === 0) {
                tableHtml = '<div class="state-empty"><p>Aucune réservation pour ce voyage.</p></div>';
            } else {
                const rows = data.map(r => {
                    const badgeClass = r.statut === 'confirmee' ? 'badge-confirmee' : r.statut === 'annulee' ? 'badge-annulee' : 'badge-attente';
                    const statutLabel = r.statut === 'confirmee' ? 'Confirmée' : r.statut === 'annulee' ? 'Annulée' : 'En attente';
                    return `
                        <tr>
                            <td>#${r.id}</td>
                            <td><strong>${r.prenom} ${r.nom}</strong><br><span style="font-size:0.7rem;color:var(--muted)">${r.email}</span></td>
                            <td style="text-align:center">${r.nb_personnes}</td>
                            <td><strong style="color:var(--gold)">${parseFloat(r.prix_total).toLocaleString('fr-FR')} TND</strong></td>
                            <td>${r.mode_paiement || '—'}</td>
                            <td><span class="statut-badge ${badgeClass}">${statutLabel}</span></td>
                            <td style="white-space:nowrap;font-size:0.72rem;color:var(--muted)">${fmtDate(r.date_reserv)}</td>
                        </tr>`;
                }).join('');

                tableHtml = `
                    <div class="modal-section-title">Liste des réservations</div>
                    <div class="res-table-wrap">
                        <table class="res-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Client</th>
                                    <th>Personnes</th>
                                    <th>Total</th>
                                    <th>Paiement</th>
                                    <th>Statut</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            }

            document.getElementById('modalBody').innerHTML = infoBox + tableHtml;
        })
        .catch(() => {
            document.getElementById('modalBody').innerHTML = '<div class="state-empty"><p>Erreur de chargement des réservations.</p></div>';
        });
}

// ── Close Modal ──
function closeModal() {
    document.getElementById('resModal').classList.remove('open');
}

document.getElementById('resModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// ── Init ──
loadVoyages();

// Initialiser la dropzone d'image quand l'onglet du formulaire est affiché
document.addEventListener('click', function(e) {
    if (e.target.closest('#tab-ajouter') || e.target.id === 'tab-ajouter') {
        setTimeout(() => setupImageDropzone(), 100);
    }
});
</script>
