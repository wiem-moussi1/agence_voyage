<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des avis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A84C;
            --gold-lt: #E8C97A;
            --ink: #171412;
            --ink-2: #4A3F35;
            --ink-3: #7D6D58;
            --sand: #F7F3ED;
            --white: #FDFBF8;
            --border: rgba(28,24,20,0.12);
            --shadow-sm: 0 1px 3px rgba(28,24,20,0.06), 0 1px 2px rgba(28,24,20,0.04);
        }
        body { font-family: 'Jost', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }
        #navbar { position: sticky; top: 0; z-index: 200; }
        .page-wrap { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
        .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .page-header-left { display: flex; flex-direction: column; gap: 0.35rem; }
        .page-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 0.5rem; }
        .page-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--gold); }
        .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--ink); line-height: 1.05; }
        .page-title em { color: var(--gold); font-style: italic; }
        .page-subtitle { color: var(--ink-3); line-height: 1.75; max-width: 680px; }
        .table-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-sm); overflow: hidden; }
        .table-card table { width: 100%; border-collapse: collapse; }
        .table-card th, .table-card td { padding: 1rem 1.2rem; text-align: left; border-bottom: 1px solid var(--border); }
        .table-card thead { background: rgba(201,168,76,0.08); }
        .table-card th { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); }
        .table-card td { font-size: 0.95rem; color: var(--ink); }
        .status { font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.08em; }
        .en_attente { color: #ad8d0f; }
        .valide { color: #1a7a24; }
        .refuse { color: #a1231e; }
        .badge-star { display: inline-flex; align-items: center; gap: 0.25rem; font-weight: 700; }
        .badge-star::after { content: '★'; color: var(--gold); }
        .btn { border: none; border-radius: 999px; padding: 0.65rem 1rem; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease; }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--gold); color: var(--ink); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-secondary { background: transparent; color: var(--ink-3); border: 1px solid var(--border); }
        .empty-state { background: var(--white); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-sm); padding: 3rem 2rem; text-align: center; min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
        .empty-state h2 { font-size: 1.5rem; color: var(--ink); }
        .empty-state p { color: var(--ink-3); line-height: 1.75; max-width: 520px; }
        .button-group { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        @media (max-width: 820px) {
            .page-header { flex-direction: column; align-items: flex-start; }
            .table-card th, .table-card td { padding: 0.85rem 0.9rem; }
            .page-title { font-size: 1.85rem; }
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div class="page-wrap">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-eyebrow">Administration</div>
                <h1 class="page-title">Gestion des avis</h1>
                <p class="page-subtitle">Gérez les avis des clients avec un design clair, en accord avec les autres sections de l’admin.</p>
            </div>
        </div>
        <div id="avisList" class="table-card">Chargement...</div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Admin') window.location.href = '../index.html';

        fetch('navBarAdmin.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar').innerHTML = html;
                const page = window.location.pathname.split('/').pop();
                const map = {
                    'dashboard.html': 'nav-dashboard',
                    'reservations.html': 'nav-reservations',
                    'voyages.html': 'nav-voyages',
                    'avis.html': 'nav-avis',
                    'messages.html': 'nav-messages'
                };
                if (map[page]) document.getElementById(map[page])?.classList.add('active');
                document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user');
                    window.location.href = '../visitor/home.html';
                });
            });

        function loadAvis() {
            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/avis&admin_id=${user.id}`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('avisList');
                    if (data.error) {
                        container.innerHTML = `<div class="empty-state"><h2>Erreur</h2><p>${data.error}</p></div>`;
                        return;
                    }
                    if (!Array.isArray(data) || data.length === 0) {
                        container.innerHTML = '<div class="empty-state"><h2>Aucun avis</h2><p>Aucun avis n’a encore été publié. Les avis validés apparaîtront ici automatiquement.</p></div>';
                        return;
                    }
                    const rows = data.map(a => `
                        <tr>
                            <td>${a.id}</td>
                            <td>${a.nom} ${a.prenom}<br><small>${a.email}</small></td>
                            <td>${a.titre}</td>
                            <td><span class="badge-star">${a.note || 0}</span></td>
                            <td>${a.commentaire || '—'}</td>
                            <td class="status ${a.statut}">${a.statut || 'en_attente'}</td>
                            <td>
                                <div class="button-group">
                                    ${a.statut === 'en_attente' ? `
                                        <button class="btn btn-primary" onclick="validateAvis(${a.id}, 'valide')">Valider</button>
                                        <button class="btn btn-danger" onclick="validateAvis(${a.id}, 'refuse')">Refuser</button>
                                    ` : `<button class="btn btn-secondary" disabled>${a.statut === 'valide' ? 'Validé' : 'Refusé'}</button>`}
                                </div>
                            </td>
                        </tr>
                    `).join('');
                    container.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Client</th>
                                    <th>Voyage</th>
                                    <th>Note</th>
                                    <th>Commentaire</th>
                                    <th>Statut</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    `;
                })
                .catch(() => {
                    document.getElementById('avisList').innerHTML = '<div class="empty-state"><h2>Impossible de charger</h2><p>Vérifiez que le serveur backend est accessible.</p></div>';
                });
        }

        window.validateAvis = function(id, statut) {
            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/avis&admin_id=${user.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, statut })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    loadAvis();
                } else {
                    alert('Erreur : ' + data.error);
                }
            })
            .catch(() => alert('Impossible de mettre à jour l’avis.'));
        };

        loadAvis();
    </script>
</body>
</html>
