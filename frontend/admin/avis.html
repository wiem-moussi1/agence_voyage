<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des avis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/adminAvis.css">
    
</head>
<body>
    <div id="navbar"></div>
    <div class="page-wrap">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-eyebrow">Administration</div>
                <h1 class="page-title">Gestion des avis</h1>
            </div>
        </div>
        <div id="avisList" class="table-card">Chargement...</div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Admin') window.location.href = '../index.html';

        fetch('navBarAdmin.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar').innerHTML = html;
                const page = window.location.pathname.split('/').pop();
                const map = {
                    'dashboard.html': 'nav-dashboard',
                    'reservations.html': 'nav-reservations',
                    'voyages.html': 'nav-voyages',
                    'avis.html': 'nav-avis',
                    'messages.html': 'nav-messages'
                };
                if (map[page]) document.getElementById(map[page])?.classList.add('active');
                document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user');
                    window.location.href = '../visitor/home.html';
                });
            });

        function loadAvis() {
            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/avis&admin_id=${user.id}`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('avisList');
                    if (data.error) {
                        container.innerHTML = `<div class="empty-state"><h2>Erreur</h2><p>${data.error}</p></div>`;
                        return;
                    }
                    if (!Array.isArray(data) || data.length === 0) {
                        container.innerHTML = '<div class="empty-state"><h2>Aucun avis</h2><p>Aucun avis n’a encore été publié. Les avis validés apparaîtront ici automatiquement.</p></div>';
                        return;
                    }
                    const rows = data.map(a => `
                        <tr>
                            <td>${a.id}</td>
                            <td>${a.nom} ${a.prenom}<br><small>${a.email}</small></td>
                            <td>${a.titre}</td>
                            <td><span class="badge-star">${a.note || 0}</span></td>
                            <td>${a.commentaire || '—'}</td>
                            <td class="status ${a.statut}">${a.statut || 'en_attente'}</td>
                            <td>
                                <div class="button-group">
                                    ${a.statut === 'en_attente' ? `
                                        <button class="btn btn-primary" onclick="validateAvis(${a.id}, 'valide')">Valider</button>
                                        <button class="btn btn-danger" onclick="validateAvis(${a.id}, 'refuse')">Refuser</button>
                                    ` : `<button class="btn btn-secondary" disabled>${a.statut === 'valide' ? 'Validé' : 'Refusé'}</button>`}
                                </div>
                            </td>
                        </tr>
                    `).join('');
                    container.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Client</th>
                                    <th>Voyage</th>
                                    <th>Note</th>
                                    <th>Commentaire</th>
                                    <th>Statut</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    `;
                })
                .catch(() => {
                    document.getElementById('avisList').innerHTML = '<div class="empty-state"><h2>Impossible de charger</h2><p>Vérifiez que le serveur backend est accessible.</p></div>';
                });
        }

        window.validateAvis = function(id, statut) {
            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/avis&admin_id=${user.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, statut })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    loadAvis();
                } else {
                    alert('Erreur : ' + data.error);
                }
            })
            .catch(() => alert('Impossible de mettre à jour l’avis.'));
        };

        loadAvis();
    </script>
</body>
</html>
