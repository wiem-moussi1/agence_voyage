<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <style>
 :root { --gold: #C9A84C; --gold-lt: #E8C97A; --dark: #0D0B09; --light: #F5F0E8; }

 .admin-nav {
   background: #0D0B09;
   padding: 0 2rem;
   display: flex;
   justify-content: space-between;
   align-items: center;
   border-bottom: 1px solid rgba(201,168,76,0.3);
   height: 64px;
   position: sticky;
   top: 0;
   z-index: 100;
 }

 .admin-nav-brand {
   display: flex;
   align-items: center;
   gap: 10px;
   text-decoration: none;
 }

 .admin-nav-brand .brand-logo {
   width: 34px;
   height: 34px;
   border: 1.5px solid var(--gold);
   border-radius: 50%;
   display: flex;
   align-items: center;
   justify-content: center;
 }

 .admin-nav-brand .brand-logo svg {
   width: 18px;
   height: 18px;
   fill: var(--gold);
 }

 .admin-nav-brand .brand-text {
   display: flex;
   flex-direction: column;
   line-height: 1.2;
 }

 .admin-nav-brand .brand-name {
   font-family: 'Cormorant Garamond', serif;
   font-size: 1.1rem;
   font-weight: 300;
   letter-spacing: 0.1em;
   color: var(--light);
 }

 .admin-nav-brand .brand-role {
   font-size: 0.52rem;
   font-weight: 600;
   letter-spacing: 0.35em;
   text-transform: uppercase;
   color: var(--gold);
 }

 .admin-nav-links {
   display: flex;
   align-items: center;
   gap: 0;
   overflow-x: auto;
   flex-wrap: nowrap;
   scrollbar-width: none;
 }

 .admin-nav-links a {
   display: flex;
   align-items: center;
   gap: 7px;
   padding: 0 1.1rem;
   height: 64px;
   text-decoration: none;
   font-family: 'Jost', sans-serif;
   font-size: 0.7rem;
   font-weight: 500;
   letter-spacing: 0.15em;
   text-transform: uppercase;
   color: rgba(245,240,232,0.6);
   border-bottom: 2px solid transparent;
   transition: color 0.2s, border-color 0.2s;
   position: relative;
   white-space: nowrap;
 }

 .admin-nav-links a svg {
   width: 15px;
   height: 15px;
   stroke: currentColor;
   fill: none;
   stroke-width: 1.5;
   flex-shrink: 0;
 }

 .admin-nav-links a:hover {
   color: var(--light);
   border-bottom-color: rgba(201,168,76,0.4);
 }

 .admin-nav-links a.active {
   color: var(--gold);
   border-bottom-color: var(--gold);
 }

 .admin-nav-divider {
   width: 1px;
   height: 24px;
   background: rgba(201,168,76,0.2);
   margin: 0 0.5rem;
   flex-shrink: 0;
 }

 .admin-nav-links a.logout-btn {
   color: rgba(201,168,76,0.7);
   margin-left: 0.25rem;
 }

 .admin-nav-links a.logout-btn:hover {
   color: var(--gold);
   border-bottom-color: transparent;
 }
</style>
</head>
<body>
   <nav class="admin-nav">
 <a href="dashboard.html" class="admin-nav-brand">

 </a>
