<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie — Horizon Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/adminMessages.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="page-wrap">

        <div class="page-header">
            <div class="page-header-left">
                <div class="page-eyebrow">Administration</div>
                <h1 class="page-title">Messagerie — <em>En attente</em></h1>
            </div>
        </div>

        <div class="empty-state">
            <div class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 4h16v12H4z"/><path d="M4 8h16"/><path d="M8 16h8"/></svg>
            </div>
            <h2>Aucun message disponible</h2>
            <p>La messagerie sera bientôt gérée dans cette interface. Pour l'instant, la page affiche un état vide propre et harmonisé.</p>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Admin') window.location.href = '../visitor/home.html';

        fetch('navBarAdmin.html').then(r => r.text()).then(html => {
            document.getElementById('navbar').innerHTML = html;
            document.getElementById('nav-messages')?.classList.add('active');
            document.getElementById('logoutBtn')?.addEventListener('click', e => {
                e.preventDefault();
                localStorage.removeItem('user');
                window.location.href = '../visitor/home.html';
            });
        });
    </script>
</body>

</html>
