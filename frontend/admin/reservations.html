<!DOCTYPE html>
<html lang="fr">
<!-- ============================================================
     HORIZON VOYAGES — Gestion des réservations (Administration)
     admin/reservations.html
     ============================================================
     DESCRIPTION:
     Interface d'administration pour la gestion complète des réservations.
     Permet de consulter toutes les réservations, modifier leur statut,
     et annuler des réservations existantes.

     FONCTIONNALITÉS:
     - Liste complète des réservations avec détails clients
     - Modification du statut des réservations (en attente/confirmée/annulée)
     - Annulation de réservations
     - Informations détaillées (client, voyage, prix, dates)
     - États vides informatifs

     DÉPENDANCES:
     - ../css/admin.css (styles généraux admin)
     - ../css/adminReservations.css (styles spécifiques)
     - navBarAdmin.html (barre de navigation admin)
     - API backend admin pour les réservations
     ============================================================ -->

<head>
    <!-- =====================================================
         MÉTADONNÉES & CONFIGURATION
         ===================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des réservations · Administration</title>

    <!-- =====================================================
         POLICES GOOGLE FONTS
         ===================================================== -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- =====================================================
         FEUILLES DE STYLE
         ===================================================== -->
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/adminReservations.css">

    <!-- =====================================================
         FAVICON & ICÔNES
         ===================================================== -->
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
</head>

<body>
    <!-- =====================================================
         BARRE DE NAVIGATION ADMINISTRATEUR
         ===================================================== -->
    <div id="navbar"></div>

    <!-- =====================================================
         CONTENU PRINCIPAL
         ===================================================== -->
    <div class="page-wrap">

        <!-- =====================================================
             EN-TÊTE DE PAGE
             ===================================================== -->
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-eyebrow">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path d="M9 11H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2h-4"/>
                        <path d="M9 11V9a3 3 0 0 1 6 0v2"/>
                    </svg>
                    Administration
                </div>
                <h1 class="page-title">Gestion des <em>réservations</em></h1>
            </div>
        </div>

        <!-- =====================================================
             LISTE DES RÉSERVATIONS
             ===================================================== -->
        <div id="reservationsList" class="table-card">
            Chargement des données...
        </div>
    </div>

    <!-- =====================================================
         SCRIPTS JAVASCRIPT
         ===================================================== -->
    <script>
        // =====================================================
        // CONFIGURATION ET SÉCURITÉ
        // =====================================================
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Admin') {
            window.location.href = '../visitor/home.html';
        }

        // =====================================================
        // CHARGEMENT DE LA BARRE DE NAVIGATION
        // =====================================================
        fetch('navBarAdmin.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar').innerHTML = html;

                // Activation du lien actif
                const page = window.location.pathname.split('/').pop();
                const map = {
                    'dashboard.html': 'nav-dashboard',
                    'reservations.html': 'nav-reservations',
                    'voyages.html': 'nav-voyages',
                    'avis.html': 'nav-avis',
                    'messages.html': 'nav-messages',
                    'contact.html': 'nav-contact',
                    'newsletter.html': 'nav-newsletter'
                };
                if (map[page]) {
                    document.getElementById(map[page])?.classList.add('active');
                }

                // Gestionnaire de déconnexion
                document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user');
                    window.location.href = '../visitor/home.html';
                });
            });

        // =====================================================
        // GESTION DES RÉSERVATIONS
        // =====================================================

        /**
         * Charge la liste des réservations depuis l'API
         */
        function loadReservations() {
            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/reservations&admin_id=${user.id}`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('reservationsList');

                    if (data.error) {
                        container.innerHTML = `<div class="empty-state"><h2>Erreur de chargement</h2><p>${data.error}</p></div>`;
                        return;
                    }

                    if (data.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" width="48" height="48">
                                    <path d="M9 11H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2h-4"/>
                                    <path d="M9 11V9a3 3 0 0 1 6 0v2"/>
                                </svg>
                                <h2>Aucune réservation</h2>
                                <p>Aucune réservation n'a encore été enregistrée dans le système.</p>
                            </div>`;
                        return;
                    }

                    // Construction du tableau des réservations
                    const tableHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Client</th>
                                    <th>Voyage</th>
                                    <th>Personnes</th>
                                    <th>Prix total</th>
                                    <th>Date réservation</th>
                                    <th>Statut</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(r => `
                                    <tr>
                                        <td>${r.id}</td>
                                        <td>
                                            <div class="client-info">
                                                <span class="client-name">${r.nom} ${r.prenom}</span>
                                                <span class="client-email">${r.email}</span>
                                            </div>
                                        </td>
                                        <td>${r.titre}</td>
                                        <td>${r.nb_personnes}</td>
                                        <td><span class="price-total">${parseFloat(r.prix_total).toLocaleString('fr-FR')} TND</span></td>
                                        <td><span class="date-reservation">${new Date(r.date_reserv).toLocaleDateString('fr-FR')}</span></td>
                                        <td><span class="status ${r.statut}">${r.statut.replace('_', ' ')}</span></td>
                                        <td>
                                            <div class="actions-cell">
                                                <select class="status-select" onchange="updateStatus(${r.id}, this.value)">
                                                    <option value="en_attente" ${r.statut === 'en_attente' ? 'selected' : ''}>En attente</option>
                                                    <option value="confirmee" ${r.statut === 'confirmee' ? 'selected' : ''}>Confirmée</option>
                                                    <option value="annulee" ${r.statut === 'annulee' ? 'selected' : ''}>Annulée</option>
                                                </select>
                                                <button class="cancel" onclick="cancelReservation(${r.id})">
                                                    <svg viewBox="0 0 24 24" width="14" height="14" style="margin-right: 4px;">
                                                        <line x1="18" y1="6" x2="6" y2="18"/>
                                                        <line x1="6" y1="6" x2="18" y2="18"/>
                                                    </svg>
                                                    Annuler
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`;

                    container.innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error('Erreur lors du chargement des réservations:', error);
                    document.getElementById('reservationsList').innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" width="48" height="48">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="15" y1="9" x2="9" y2="15"/>
                                <line x1="9" y1="9" x2="15" y2="15"/>
                            </svg>
                            <h2>Erreur de connexion</h2>
                            <p>Impossible de charger les réservations. Vérifiez votre connexion.</p>
                        </div>`;
                });
        }

        // =====================================================
        // ACTIONS SUR LES RÉSERVATIONS
        // =====================================================

        /**
         * Met à jour le statut d'une réservation
         * @param {number} id - ID de la réservation
         * @param {string} statut - Nouveau statut
         */
        window.updateStatus = function(id, statut) {
            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/reservations&admin_id=${user.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, statut })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    loadReservations(); // Recharger la liste
                } else {
                    alert('Erreur : ' + (data.error || 'Erreur inconnue'));
                }
            })
            .catch(error => {
                console.error('Erreur lors de la mise à jour du statut:', error);
                alert('Erreur de connexion lors de la mise à jour du statut');
            });
        };

        /**
         * Annule une réservation
         * @param {number} id - ID de la réservation à annuler
         */
        window.cancelReservation = function(id) {
            if (!confirm('Êtes-vous sûr de vouloir annuler cette réservation ? Cette action est irréversible.')) return;

            fetch(`http://localhost/agence_voyage/backend/index.php?uri=admin/reservations&id=${id}&admin_id=${user.id}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    loadReservations(); // Recharger la liste
                } else {
                    alert('Erreur : ' + (data.error || 'Erreur inconnue'));
                }
            })
            .catch(error => {
                console.error('Erreur lors de l\'annulation de la réservation:', error);
                alert('Erreur de connexion lors de l\'annulation');
            });
        };

        // =====================================================
        // INITIALISATION
        // =====================================================
        loadReservations();
    </script>
</body>
</html>
