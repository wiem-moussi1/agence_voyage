<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des réservations</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A84C;
            --gold-lt: #E8C97A;
            --gold-dim: rgba(201,168,76,0.12);
            --ink: #171412;
            --ink-2: #4A3F35;
            --ink-3: #7D6D58;
            --sand: #F7F3ED;
            --sand-2: #EDE6DB;
            --white: #FDFBF8;
            --border: rgba(28,24,20,0.12);
            --shadow-sm: 0 1px 3px rgba(28,24,20,0.06), 0 1px 2px rgba(28,24,20,0.04);
            --shadow-md: 0 4px 16px rgba(28,24,20,0.08), 0 2px 6px rgba(28,24,20,0.04);
        }
        body { font-family: 'Jost', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }
        #navbar { position: sticky; top: 0; z-index: 200; }
        .page-wrap { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
        .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .page-header-left { display: flex; flex-direction: column; gap: 0.35rem; }
        .page-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 0.5rem; }
        .page-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--gold); }
        .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--ink); line-height: 1.05; }
        .page-title em { color: var(--gold); font-style: italic; }
        .page-subtitle { color: var(--ink-3); line-height: 1.75; max-width: 680px; }
        .table-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-sm); overflow: hidden; }
        .table-card table { width: 100%; border-collapse: collapse; }
        .table-card th, .table-card td { padding: 1rem 1.2rem; text-align: left; border-bottom: 1px solid var(--border); }
        .table-card thead { background: var(--sand); }
        .table-card th { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); }
        .table-card td { font-size: 0.9rem; color: var(--ink); }
        .status { font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.08em; }
        .en_attente { color: #ad8d0f; }
        .confirmee { color: #1a7a24; }
        .annulee { color: #a1231e; }
        select, button { border-radius: 999px; padding: 0.65rem 0.95rem; border: 1px solid var(--border); background: var(--white); color: var(--ink); font-weight: 700; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease; }
        select { width: auto; min-width: 140px; }
        button:hover, select:hover { transform: translateY(-1px); }
        button.cancel { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .empty-state { background: var(--white); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-sm); padding: 3rem 2rem; text-align: center; min-height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
        .empty-state h2 { font-size: 1.5rem; color: var(--ink); }
        .empty-state p { color: var(--ink-3); line-height: 1.75; max-width: 520px; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div class="page-wrap">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-eyebrow">Administration</div>
                <h1 class="page-title">Gestion des réservations</h1>
                <p class="page-subtitle">Lorem ipsum dolor sit amet consectetur adipisicing elit. Possimus, eum quo nesciunt consequatur facilis a error excepturi maxime, labore vero explicabo recusandae dicta! Maiores optio quos, quia blanditiis voluptate distinctio?</p>
            </div>
        </div>
        <div id="reservationsList" class="table-card">Chargement...</div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Admin') window.location.href = '../index.html';

        // ── Load Navbar ──
        fetch('navBarAdmin.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar').innerHTML = html;

                // Active link
                const page = window.location.pathname.split('/').pop();
                const map = {
                    'dashboard.html': 'nav-dashboard',
                    'reservations.html': 'nav-reservations',
                    'voyages.html': 'nav-voyages',
                    'avis.html': 'nav-avis',
                    'messages.html': 'nav-messages'
                };
                if (map[page]) {
                    document.getElementById(map[page])?.classList.add('active');
                }

                // Logout
                document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user');
                    window.location.href = '../visitor/home.html';
                });
            });

        function loadReservations() {
            fetch(`http://localhost/AGENCE_VOYAGE/backend/index.php?uri=admin/reservations&admin_id=${user.id}`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('reservationsList');
                    if (data.error) {
                        container.innerHTML = `<p>${data.error}</p>`;
                        return;
                    }
                    if (data.length === 0) {
                        container.innerHTML = '<div class="empty-state"><h2>Aucune réservation</h2><p>Aucune réservation n’a encore été enregistrée dans le système.</p></div>';
                        return;
                    }
                    const html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th><th>Client</th><th>Voyage</th><th>Personnes</th><th>Prix total</th><th>Date réservation</th><th>Statut</th><th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(r => `
                                    <tr>
                                        <td>${r.id}</td>
                                        <td>${r.nom} ${r.prenom}<br><small>${r.email}</small></td>
                                        <td>${r.titre}</td>
                                        <td>${r.nb_personnes}</td>
                                        <td>${r.prix_total} TND</td>
                                        <td>${new Date(r.date_reserv).toLocaleString()}</td>
                                        <td class="status ${r.statut}">${r.statut}</td>
                                        <td>
                                            <select onchange="updateStatus(${r.id}, this.value)">
                                                <option value="en_attente" ${r.statut === 'en_attente' ? 'selected' : ''}>En attente</option>
                                                <option value="confirmee" ${r.statut === 'confirmee' ? 'selected' : ''}>Confirmée</option>
                                                <option value="annulee" ${r.statut === 'annulee' ? 'selected' : ''}>Annulée</option>
                                            </select>
                                            <button class="cancel" onclick="cancelReservation(${r.id})">Annuler</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    container.innerHTML = `<div class="table-card">${html}</div>`;
                });
        }

        window.updateStatus = function(id, statut) {
            fetch(`http://localhost/AGENCE_VOYAGE/backend/index.php?uri=admin/reservations&admin_id=${user.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, statut })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    loadReservations();
                } else {
                    alert('Erreur : ' + data.error);
                }
            });
        };

        window.cancelReservation = function(id) {
            if (!confirm('Annuler cette réservation ?')) return;
            fetch(`http://localhost/AGENCE_VOYAGE/backend/index.php?uri=admin/reservations&id=${id}&admin_id=${user.id}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    loadReservations();
                } else {
                    alert('Erreur : ' + data.error);
                }
            });
        };

        loadReservations();
    </script>
</body>
</html>
